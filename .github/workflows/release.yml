name: Release JARs

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build JARs
        run: ./gradlew :rpc-protocol:jar :rpc-gen:jar

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            rpc-protocol/build/libs/rpc-protocol-${{ steps.version.outputs.VERSION }}.jar
            rpc-gen/build/libs/rpc-gen-${{ steps.version.outputs.VERSION }}.jar
